services:
  postgres:
    image: postgres:16-alpine
    container_name: plotline-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: plotline
      POSTGRES_PASSWORD: plotline
      POSTGRES_DB: plotline
    volumes:
      - plotline-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plotline -d plotline"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  plotline-postgres-data:
